<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/mystyle.css" />
    <style>
      input:focus {
        background-color: bisque;
      }
    </style>
    <script>
      function calc(obj) {
        const res = document.getElementById("res");
        if(obj.checked) {
          res.value = parseInt(res.value) + parseInt(obj.value);
        } else {
          res.value = res.value - obj.value;
        }
        
      }
    </script>
  </head>
  <body>
    <!-- post, get, put, patch, delete  
       post / get -->
    <form action="#" method="get" onsubmit="calc(event)">
      <input type="checkbox" id="check1" value="1000" onclick="calc(this)"> 1000 원
      <input type="checkbox" id="check2" value="2000" onclick="calc(this)"> 2000 원
      <input type="checkbox" id="check3" value="3000" onclick="calc(this)"> 3000 원

      결과 <input type="text" name="res" id="res" value="0" disabled>
    </form>
    <!-- http://127.0.0.1:5500/techstory/form.html?userid=aaa&pwd=1111# -->
  </body>
</html>
