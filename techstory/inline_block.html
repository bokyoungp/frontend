<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 인라인 태그 */
      span {
        /* display: block; */
        display: inline-block;
        width: 300px;
        height: 300px;
        background-color: bisque;
      }
      /* 블록 태그 */
      div,
      p
       {
        /* display: inline; */
        border: solid black 1px;
      } 
      h1 {
        /* display: none; */
        visibility: visible;
      }
      h1:hover {
        visibility: hidden;
      }
      body {
        margin: 5;
      }
    </style>
  </head>
  <body>
    <div>div</div>
    <div>div</div>
    <p>p</p>
    <h1>h1</h1>
    <div><span>block span</span>과 <span>block span</span>입니다.</div>
  </body>
</html>
