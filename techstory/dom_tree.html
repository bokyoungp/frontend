<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>DOM 객체 p</h3>
    <hr />
    <p
      id="firstP"
      style="color: red; background-color: yellow"
      onclick="this.style.color = 'teal'"
    >
      이것은 <span style="color: red"> 문장입니다.</span>
    </p>
    <p id="secondP"></p>
    <p id="thirdP">
      저는 빨간 <span>사과</span>를 좋아해서 아침마다 한 개씩 먹고 있어요.
      운동할 때는 중간 중간에 <span>바나나</span>를 먹지요. 탄수화물 섭취가 빨라
      힘이 납니다. 또한 달콤한 향기를 품은 <span>체리</span>와 여름 냄새 물씬
      나는 <span>자두</span>를 좋아합니다.
    </p>

    <script>
      const secondP = document.getElementById("secondP");
      secondP.style.color = "red";
      secondP.style.backgroundColor = "yellow";
      secondP.innerHTML =
        '이것은 <span style="color: red;"> 문장입니다.</span>';
      secondP.onclick = () => {
        secondP.style.color = "teal";
      };

      let thirdP = document.getElementById("thirdP");
      console.log(thirdP.childElementCount);
      let spans = document.getElementsByTagName("span");
      let spanCollection = document.querySelectorAll("#thirdP>span");
      console.log(spanCollection);
      for (const span of spanCollection) {
        span.style.color = 'violet';
      }
    </script>
  </body>
</html>
