<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            position: relative;
            width: 200px; height: 50px; border: 1px solid black;
        }
        #box {
            position:absolute;
            top:10px;
            width: 10px; height: 10px; background-color: red;
            animation-name: boxMoveAnimation ;
            animation-duration: 3s;
            animation-iteration-count: 1;
        }
        @keyframes boxMoveAnimation {
            from {
                left:10px
            }
            to {
                left:180px
            }  
        }

    </style>
</head>
<body>
    <h1>애니메이션</h1>
    <hr>
    <div id="container">
        <div id="box"></div>
    </div>
</body>
</html>
