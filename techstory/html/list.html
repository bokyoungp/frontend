<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피 List</title>
    <style>
        #menubar {
            background-color: olive;
        }
        #menubar>ul {
            margin: 0;
            padding: 0;
            width: 567px;
        }
        #menubar>ul>li {
            display: inline-block;
            padding: 0px 15px;
        }
        #menubar a {
            color:white;
            text-decoration: none;
        }
        #menubar a:hover {
            color:violet;
        }
    </style>
</head>
<body>
<nav id="menubar">
	<ul>
		<li><a href="#">Home</a></li>
		<li><a href="#">Espresso</a></li>
		<li><a href="#">Cappuccino</a></li>
		<li><a href="#">Cafe Latte</a></li>
		<li><a href="#">F.A.Q</a></li>
	</ul>
</nav>
</body>
</html>
