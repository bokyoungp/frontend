<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="container">
    </ul>
    <button id="btn">클릭</button>
    <script>
        let counter = 0;
        // button 객체를 가져온다.
        const button = document.getElementById("btn");
        // button 객체의 속성을 변경(onclick)
        button.onclick = () => { // id 가 container 인 객체를 가져와서(부모) 자식객체 li를 생성한 후 dom tree 에 추가한다.
            const container = document.getElementById("container");
            const child = document.createElement("li");
            child.innerHTML = "새로 생성된 리스트 엘리먼트입니다." + counter++;
            container.prepend(child);
        };

    </script>
</body>
</html>
