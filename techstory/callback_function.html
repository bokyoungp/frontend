<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let callOnce = function () {
            console.log("콜백 함수입니다.");
        }
        // console.log(callback);
        // callback();

        function callTheOther(callback) {
            let result = callback(10,20);
            console.log(result);
        }
        //callTheOther(callOnce);
        let add = (n1, n2) => n1 + n2;
        callTheOther(add);

        let sub = (n1, n2) => n1 - n2;
        callTheOther(sub);

        let multiply = (n1, n2) => n1 * n2;
        callTheOther(multiply);

        let divide = (n1, n2) => n1 / n2;
        callTheOther(divide);
    </script>
</body>
</html>
